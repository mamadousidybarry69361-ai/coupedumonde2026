<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores & Publicités Coupe du Monde 2026</title>

    <!-- ⬇️ COLLEZ VOTRE CODE GOOGLE ADSENSE JUSTE EN DESSOUS DE CETTE LIGNE ⬇️ -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        header { background-color: #003366; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .match-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .team { font-size: 1.2rem; font-weight: bold; width: 40%; }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        .score { font-size: 1.5rem; background: #e0e0e0; padding: 5px 15px; border-radius: 4px; font-weight: bold; }
        .status { font-size: 0.9rem; color: #777; text-align: center; }
        .live { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 COUPE DU MONDE 2026 ⚽</h1>
        <p>Scores en direct & Actualités</p>
    </header>

    <div class="container">
        <h2>Matchs en cours et à venir</h2>
        
        <!-- Exemple de match en direct -->
        <div class="match-card">
            <div class="team home">France 🇫🇷</div>
            <div class="score">2 - 1</div>
            <div class="team away">🇸🇳 Sénégal</div>
            <div class="status live">En cours (75')</div>
        </div>

        <!-- Exemple de match terminé -->
        <div class="match-card">
            <div class="team home">États-Unis 🇺🇸</div>
            <div class="score">1 - 0</div>
            <div class="team away">🇲🇦 Maroc</div>
            <div class="status">Terminé</div>
        </div>
    </div>

</body>
</html>
